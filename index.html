<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <h1 class="logo">Spotify</h1>

        <div class="menu">
          <div class="menu-item active">Home</div>
          <div class="menu-item">Search</div>
          <div class="menu-item">Your Library</div>
        </div>
      </div>

      <div class="library-box">
        <h3>Create your first playlist</h3>
        <p>It's easy, we'll help you.</p>
        <button>Create Playlist</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="nav-buttons">
          <button class="circle-btn">&#10094;</button>
          <button class="circle-btn">&#10095;</button>
        </div>

        <input type="text" id="searchInput" placeholder="What do you want to play?" />
      </header>

      <section class="hero">
        <h2>Good evening</h2>

        <div class="quick-grid">
          <div class="quick-card">Liked Songs</div>
          <div class="quick-card">Daily Mix 1</div>
          <div class="quick-card">Discover Weekly</div>
          <div class="quick-card">Chill Hits</div>
          <div class="quick-card">Top 50 Global</div>
          <div class="quick-card">Workout Mix</div>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h3>Made for you</h3>
          <span>Show all</span>
        </div>

        <div class="cards" id="cardsContainer"></div>
      </section>
    </main>
  </div>

  <footer class="player">
    <div class="player-left">
      <div class="song-art"></div>
      <div>
        <h4 id="playerTitle">No Surprises</h4>
        <p id="playerArtist">Radiohead</p>
      </div>
    </div>

    <div class="player-center">
      <button id="playBtn">▶</button>
    </div>

    <div class="player-right">
      <div class="volume-bar">
        <div class="volume-fill"></div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
